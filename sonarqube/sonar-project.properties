# SonarQube Project Configuration
sonar.projectKey=demo-app
sonar.projectName=Demo App — DevSecOps Pipeline
sonar.projectVersion=1.0

# Source directories
sonar.sources=app/src
sonar.tests=app/tests
sonar.language=py

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverage.exclusions=**/tests/**,**/migrations/**

# Security reports
sonar.python.bandit.reportPaths=bandit-report.json

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/node_modules/**

# Quality Gate — enforced in CI
sonar.qualitygate.wait=true

# Issue thresholds (new code)
sonar.newCode.referenceBranch=main
