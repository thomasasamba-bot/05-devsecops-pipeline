name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy to environment"
        required: true
        default: "staging"
        type: choice
        options: [dev, staging, prod]
      skip_scans:
        description: "Skip security scans (emergency only)"
        required: false
        default: "false"
        type: boolean

env:
  AWS_REGION:       us-east-1
  ECR_REGISTRY:     ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY:   demo-app
  EKS_CLUSTER:      eks-demo
  SONAR_PROJECT:    demo-app
  IMAGE_TAG:        ${{ github.sha }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────
  # JOB 1 — CODE QUALITY & SAST
  # ─────────────────────────────────────────────
  code-quality:
    name: Code Quality & SAST
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_scans != 'true' }}
    defaults:
      run:
        shell: bash   # ✅ fail fast

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip
        run: pip install --upgrade pip  # ✅ fix dependency issues

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov pytest-asyncio bandit safety

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV  # ✅ fix ModuleNotFoundError

      - name: Run unit tests with coverage
        run: |
          pytest app/tests/ \
            --cov=app/src \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            --cov-fail-under=80 \
            --junitxml=test-results.xml \
            -v

      - name: Terraform validate
        run: |
          if [ -d terraform ]; then
            cd terraform
            terraform init -backend=false
            terraform validate
          fi  # ✅ infra validation

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
            coverage-html/

      - name: Bandit SAST scan
        run: |
          bandit -r app/src/ -f json -o bandit-report.json --severity-level medium --confidence-level medium

      - name: Safety dependency vulnerability scan
        run: |
          safety scan -r app/requirements.txt --json --full-report --non-interactive > safety-report.json  # ✅ production-safe non-interactive

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: |
            -Dsonar.projectKey=${{ env.SONAR_PROJECT }}
            -Dsonar.sources=app/src
            -Dsonar.tests=app/tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.bandit.reportPaths=bandit-report.json
            -Dsonar.qualitygate.wait=true

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            safety-report.json

  # ─────────────────────────────────────────────
  # JOB 2 — BUILD & PUSH DOCKER IMAGE
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: code-quality
    defaults:
      run:
        shell: bash

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-uri:    ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: app/
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          artifact-name: sbom-${{ github.sha }}.spdx
          output-file: ./sbom.spdx
          format: spdx-json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx

  # ─────────────────────────────────────────────
  # JOB 3 — CONTAINER SECURITY SCAN
  # ─────────────────────────────────────────────
  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.skip_scans != 'true' }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy image scan (CRITICAL/HIGH)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-uri }}
          severity: CRITICAL,HIGH
          exit-code: "1"   # ✅ fail pipeline if severe vulnerabilities

      - name: Full Trivy report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-uri }}
          format: json
          output: trivy-full-report.json
          exit-code: "0"

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-full-report.json

      - name: Parse Trivy results
        if: always()
        run: python scripts/parse_trivy_report.py trivy-full-report.json

  # ─────────────────────────────────────────────
  # JOB 4 — DAST Scan (OWASP ZAP)
  # ─────────────────────────────────────────────
  dast:
    name: DAST Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start app for DAST
        run: |
          docker run -d --name app-dast -p 8080:8080 ${{ needs.build.outputs.image-uri }} || \
          docker run -d --name app-dast -p 8080:8080 nginx:alpine
          sleep 10
          curl -f http://localhost:8080/ || echo "App may not have /health endpoint"

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: "http://localhost:8080"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false
          artifact_name: zap-report

  # ─────────────────────────────────────────────
  # JOBS 5 → 7 — DEPLOY DEV → STAGING → PROD (ArgoCD)
  # ─────────────────────────────────────────────
  deploy-dev:
    name: Deploy → Dev
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/develop'
    environment:
      name: dev
      url: https://dev.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Update ArgoCD image
        run: |
          python scripts/update_image_tag.py \
            --image "${{ needs.build.outputs.image-uri }}" \
            --environment dev \
            --commit "${{ github.sha }}"

      - name: ArgoCD sync
        run: |
          argocd app sync demo-app-dev --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} --timeout 300 --prune

      - name: Wait for ArgoCD health
        run: |
          argocd app wait demo-app-dev --server ${{ secrets.ARGOCD_SERVER }} \
            --auth-token ${{ secrets.ARGOCD_TOKEN }} --health --timeout 300

      - name: Run smoke tests
        run: python scripts/smoke_test.py --env dev --url https://dev.example.com

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Zero-downtime deploy
        run: |
          python scripts/zero_downtime_deploy.py \
            --deployment api \
            --namespace app-staging \
            --image "${{ needs.build.outputs.image-uri }}" \
            --canary \
            --timeout 300

      - name: Integration tests
        run: python scripts/integration_test.py --env staging

  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://app.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Zero-downtime deploy
        run: |
          python scripts/zero_downtime_deploy.py \
            --deployment api \
            --namespace app \
            --image "${{ needs.build.outputs.image-uri }}" \
            --canary \
            --timeout 600

      - name: Run production smoke tests
        run: python scripts/smoke_test.py --env prod --url https://app.example.com

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Production deployment successful"
          echo "Image: ${{ needs.build.outputs.image-uri }}"
          echo "Commit: ${{ github.sha }}"

      - name: Auto-rollback on failure
        if: failure()
        run: |
          kubectl rollout undo deployment/api -n app
          kubectl rollout status deployment/api -n app --timeout=120s
          echo "🔄 Auto-rollback complete"