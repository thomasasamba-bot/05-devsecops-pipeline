name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy to environment"
        required: true
        default: "staging"
        type: choice
        options: [dev, staging, prod]
      skip_scans:
        description: "Skip security scans (emergency only)"
        required: false
        default: "false"
        type: boolean

env:
  AWS_REGION:       us-east-1
  ECR_REGISTRY:     ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY:   demo-app
  EKS_CLUSTER:      eks-demo
  SONAR_PROJECT:    demo-app
  IMAGE_TAG:        ${{ github.sha }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  code-quality:
    name: Code Quality & SAST
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_scans != 'true' }}

    defaults:
      run:
        shell: bash -e   # ✅ ADDED: fail fast on any command error

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Upgrade pip   # ✅ ADDED: avoids dependency issues in CI
        run: pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-cov pytest-asyncio bandit safety

      - name: Set PYTHONPATH   # ✅ ADDED: FIX for ModuleNotFoundError
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run unit tests with coverage
        run: |
          pytest app/tests/ \
            --cov=app/src \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-html \
            --cov-fail-under=80 \
            --junitxml=test-results.xml \
            -v

      - name: Terraform validate   # ✅ ADDED: infra validation (production best practice)
        run: |
          if [ -d terraform ]; then
            cd terraform
            terraform init -backend=false
            terraform validate
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml
            coverage-html/

      - name: Bandit SAST scan
        run: |
          bandit -r app/src/ \
            -f json \
            -o bandit-report.json \
            --severity-level medium \
            --confidence-level medium

      - name: Safety dependency vulnerability check
        run: |
          safety check \
            -r app/requirements.txt \
            --json \
            --output safety-report.json

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: |
            -Dsonar.projectKey=${{ env.SONAR_PROJECT }}
            -Dsonar.sources=app/src
            -Dsonar.tests=app/tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.bandit.reportPaths=bandit-report.json
            -Dsonar.qualitygate.wait=true

      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            safety-report.json

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: code-quality

    defaults:
      run:
        shell: bash -e   # ✅ ADDED: fail fast

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-uri:    ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: app/
          file: app/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build

    defaults:
      run:
        shell: bash -e   # ✅ ADDED

    if: ${{ github.event.inputs.skip_scans != 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trivy image scan (CRITICAL only - enforce policy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-uri }}
          severity: CRITICAL
          exit-code: "1"   # ✅ ENFORCED: production gating
